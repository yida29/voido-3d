<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>voido 3D 見取り図</title>
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #87ceeb; font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; }
      #app { width: 100vw; height: 100vh; display: block; cursor: crosshair; }

      #hud {
        position: absolute; top: 12px; left: 12px;
        color: #fff; font-size: 12px; line-height: 1.6;
        background: rgba(0, 0, 0, 0.4); padding: 10px 14px; border-radius: 6px;
        pointer-events: auto; z-index: 5;
      }
      #hud a { color: #6cf; text-decoration: none; }
      #hud a:hover { text-decoration: underline; }
      #crosshair {
        position: absolute; top: 50%; left: 50%; width: 6px; height: 6px;
        margin: -3px 0 0 -3px; border-radius: 50%; background: rgba(255,255,255,0.7);
        pointer-events: none; z-index: 4;
      }
    </style>
  </head>
  <body>
    <canvas id="app"></canvas>
    <div id="crosshair"></div>
    <div id="hud">
      <div><b>voido</b> 3D 見取り図 — <a href="roundtrip.html">📐 ラウンドトリップ検証</a></div>
      <div>クリックでマウスロック / ESC で解除</div>
      <div>WASD: 移動 / Shift: ダッシュ / マウス: 視点</div>
      <div>1: 1F / 2: 2F に瞬間移動</div>
      <div>G: 壁すり抜け (no-clip) / Space: 上昇 / C: 下降 (no-clip中)</div>
      <div id="mode-status" style="color:#ffa"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
